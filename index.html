<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | Mal3abi - نتائج مباشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --live: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }

        body { background-color: var(--bg); color: var(--text); padding: 15px; }

        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--card); padding-bottom: 15px; }
        header h1 { color: var(--accent); font-size: 2.2rem; }
        header p { font-size: 0.9rem; opacity: 0.8; }

        .nav-leagues {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--accent);
            color: var(--bg);
            font-weight: bold;
        }

        #matches-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .match-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .team {
            flex: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 0.9rem; font-weight: bold; }

        .score-area {
            flex: 1;
            text-align: center;
        }

        .score {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent);
        }

        .status {
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .live-tag {
            background: var(--live);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.4; } }

        .loading { text-align: center; font-size: 1.1rem; margin-top: 40px; color: var(--accent); }
        .error-msg { text-align: center; color: #f87171; background: #450a0a; padding: 10px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ ملعبي</h1>
        <p>نتائج المباريات والبطولات العالمية</p>
    </header>

    <div class="nav-leagues">
        <button class="nav-btn active" onclick="changeLeague('PL', this)">الدوري الإنجليزي</button>
        <button class="nav-btn" onclick="changeLeague('PD', this)">الدوري الإسباني</button>
        <button class="nav-btn" onclick="changeLeague('BL1', this)">الدوري الألماني</button>
        <button class="nav-btn" onclick="changeLeague('SA', this)">الدوري الإيطالي</button>
        <button class="nav-btn" onclick="changeLeague('CL', this)">دوري الأبطال</button>
    </div>

    <div id="matches-container">
        <div class="loading">جاري جلب النتائج...</div>
    </div>

    <script>
        // مفتاح الـ API الخاص بك تم وضعه هنا بنجاح
        const API_KEY = '9b0890e8a1324b4e9161b2cac08666dd'; 
        let currentLeague = 'PL';

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            
            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${currentLeague}/matches`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) {
                    if(response.status === 429) throw new Error('تجاوزت حد الطلبات (10 بالدقيقة). انتظر دقيقة وحدث الصفحة.');
                    throw new Error('فشل في الاتصال بالبيانات.');
                }

                const data = await response.json();
                renderMatches(data.matches);
            } catch (error) {
                container.innerHTML = `<div class="error-msg">${error.message}</div>`;
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            
            // فلترة مباريات اليوم فقط أو القريبة
            const today = new Date().toISOString().split('T')[0];
            const recentMatches = matches.filter(m => m.utcDate.includes(today)).slice(0, 15);

            if (recentMatches.length === 0) {
                container.innerHTML = `<div class="loading">لا توجد مباريات مجدولة لليوم في هذه البطولة</div>`;
                return;
            }

            container.innerHTML = recentMatches.map(match => {
                const isLive = ['IN_PLAY', 'PAUSED', 'HALF_TIME'].includes(match.status);
                const matchTime = new Date(match.utcDate).toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'});
                
                return `
                    <div class="match-card">
                        <div class="team">
                            <img src="${match.homeTeam.crest}" onerror="this.src='https://via.placeholder.com/50?text=Team'">
                            <span>${match.homeTeam.shortName || match.homeTeam.name}</span>
                        </div>
                        
                        <div class="score-area">
                            <div class="score">
                                ${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}
                            </div>
                            <div class="status">
                                ${isLive ? '<span class="live-tag">مباشر</span>' : matchTime}
                            </div>
                        </div>

                        <div class="team">
                            <img src="${match.awayTeam.crest}" onerror="this.src='https://via.placeholder.com/50?text=Team'">
                            <span>${match.awayTeam.shortName || match.awayTeam.name}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeLeague(leagueCode, btn) {
            currentLeague = leagueCode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('matches-container').innerHTML = '<div class="loading">جاري التحديث...</div>';
            fetchMatches();
        }

        // تشغيل الجلب الأول
        fetchMatches();

        // التحديث التلقائي كل دقيقتين (لتجنب حظر الـ API المجاني)
        setInterval(fetchMatches, 120000);
    </script>
</body>
</html>
