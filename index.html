<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | منصة النتائج المباشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffa3;
            --accent-soft: rgba(0, 255, 163, 0.1);
            --danger: #ff3b3b;
            --bg: #050507;
            --card: #111114;
            --card-brd: rgba(255,255,255,0.05);
            --txt: #ffffff;
            --txt-mute: #8e8e93;
            --grad: linear-gradient(135deg, #111114 0%, #1a1a20 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--txt); 
            font-family: 'Noto Sans Arabic', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            background: rgba(5, 5, 7, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-brd);
            padding: 15px 5%;
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-ico {
            background: var(--accent);
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.3);
        }
        .logo-txt h1 { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        .stats-bar {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px 5%;
        }
        .stat-box {
            background: var(--grad); border: 1px solid var(--card-brd);
            padding: 15px; border-radius: 18px; text-align: center;
        }
        .stat-num { font-size: 24px; font-weight: 800; display: block; color: var(--accent); }
        .stat-box.live .stat-num { color: var(--danger); }
        .stat-lbl { font-size: 11px; color: var(--txt-mute); margin-top: 4px; }

        .wrapper {
            max-width: 1200px; margin: 0 auto; padding: 0 5% 40px;
            display: grid; grid-template-columns: 240px 1fr; gap: 25px;
        }

        .side-nav { position: sticky; top: 90px; height: fit-content; }
        .nav-group { background: var(--card); border-radius: 20px; padding: 8px; border: 1px solid var(--card-brd); }
        .nav-btn {
            width: 100%; border: none; background: transparent; color: var(--txt-mute);
            padding: 12px 15px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
            font-size: 14px; font-family: inherit; margin-bottom: 2px; text-align: right;
        }
        .nav-btn.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .search { flex: 1; position: relative; }
        .search input {
            width: 100%; background: var(--card); border: 1px solid var(--card-brd);
            padding: 12px 15px; border-radius: 12px; color: #fff; font-family: inherit;
        }

        .league-title { margin: 25px 0 12px; font-size: 14px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .match-card {
            background: var(--grad); border-radius: 16px; border: 1px solid var(--card-brd);
            margin-bottom: 10px; padding: 15px; display: grid; grid-template-columns: 80px 1fr 50px; align-items: center;
        }

        .m-status { text-align: center; font-size: 12px; border-left: 1px solid var(--card-brd); }
        .live-tag { color: var(--danger); font-weight: 800; animation: blink 2s infinite; }
        
        .m-teams { padding: 0 15px; display: flex; flex-direction: column; gap: 8px; }
        .t-row { display: flex; justify-content: space-between; align-items: center; }
        .t-pkg { display: flex; align-items: center; gap: 10px; }
        .t-logo { width: 22px; height: 22px; object-fit: contain; }
        .t-name { font-size: 14px; color: var(--txt-mute); }
        .t-name.win { color: var(--txt); font-weight: 700; }
        .m-score { font-weight: 800; font-size: 16px; color: var(--txt-mute); }
        .m-score.win { color: var(--accent); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 800px) {
            .wrapper { grid-template-columns: 1fr; }
            .side-nav { display: none; }
            .stats-bar { padding: 15px 5%; gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-ico">⚽</div>
        <div class="logo-txt"><h1>ملعبي</h1></div>
    </div>
    <button onclick="fetchData()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer;">تحديث</button>
</header>

<div class="stats-bar">
    <div class="stat-box live"><span class="stat-num" id="s-live">0</span><span class="stat-lbl">مباشر</span></div>
    <div class="stat-box"><span class="stat-num" id="s-total">0</span><span class="stat-lbl">اليوم</span></div>
    <div class="stat-box"><span class="stat-num" id="s-done">0</span><span class="stat-lbl">انتهت</span></div>
</div>

<div class="wrapper">
    <aside class="side-nav">
        <div class="nav-group" id="league-menu">
            <button class="nav-btn active" onclick="setFilter('all', this)">كل المباريات</button>
            <button class="nav-btn" onclick="setFilter('CL', this)">دوري أبطال أوروبا</button>
            <button class="nav-btn" onclick="setFilter('PL', this)">الدوري الإنجليزي</button>
            <button class="nav-btn" onclick="setFilter('PD', this)">الدوري الإسباني</button>
            <button class="nav-btn" onclick="setFilter('SA', this)">الدوري الإيطالي</button>
            <button class="nav-btn" onclick="setFilter('BL1', this)">الدوري الألماني</button>
        </div>
    </aside>

    <main>
        <div class="controls">
            <div class="search"><input type="text" id="mSearch" placeholder="ابحث عن فريق..." oninput="render()"></div>
        </div>
        <div id="match-list"><div style="text-align:center; padding:50px; color:var(--txt-mute);">جاري جلب النتائج...</div></div>
    </main>
</div>

<script>
    const KEY = '9b0890e8a1324b4e9161b2cac08666dd';
    const COMPS = ['CL', 'PL', 'PD', 'SA', 'BL1'];
    const NAMES = { CL: 'دوري أبطال أوروبا', PL: 'الدوري الإنجليزي', PD: 'الدوري الإسباني', SA: 'الدوري الإيطالي', BL1: 'الدوري الألماني' };
    
    let matches = [];
    let currentFilter = 'all';

    async function fetchData() {
        const today = new Date().toISOString().split('T')[0];
        matches = []; 
        
        for (const id of COMPS) {
            try {
                const res = await fetch(`https://api.football-data.org/v4/competitions/${id}/matches?dateFrom=${today}&dateTo=${today}`, {
                    headers: { 'X-Auth-Token': KEY }
                });
                const data = await res.json();
                if (data.matches) {
                    matches.push(...data.matches.map(m => ({ ...m, lgId: id })));
                }
                // تأخير بسيط لتجنب حظر الـ API
                await new Promise(r => setTimeout(r, 500));
            } catch (e) { console.error("Error loading " + id); }
        }
        updateStats();
        render();
    }

    function updateStats() {
        document.getElementById('s-live').textContent = matches.filter(m => ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status)).length;
        document.getElementById('s-total').textContent = matches.length;
        document.getElementById('s-done').textContent = matches.filter(m => m.status === 'FINISHED').length;
    }

    function render() {
        const container = document.getElementById('match-list');
        const query = document.getElementById('mSearch').value.toLowerCase();
        
        const filtered = matches.filter(m => {
            const isLg = currentFilter === 'all' || m.lgId === currentFilter;
            const isSearch = m.homeTeam.name.toLowerCase().includes(query) || m.awayTeam.name.toLowerCase().includes(query);
            return isLg && isSearch;
        });

        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--txt-mute);">لا توجد مباريات حالياً</div>';
            return;
        }

        const groups = filtered.reduce((acc, m) => {
            if(!acc[m.lgId]) acc[m.lgId] = [];
            acc[m.lgId].push(m);
            return acc;
        }, {});

        container.innerHTML = Object.entries(groups).map(([lg, list]) => `
            <div class="league-title">🏆 ${NAMES[lg]}</div>
            ${list.map(m => {
                const isLive = ['IN_PLAY','PAUSED','HALFTIME'].includes(m.status);
                const hScore = m.score.fullTime.home;
                const aScore = m.score.fullTime.away;
                return `
                <div class="match-card">
                    <div class="m-status">
                        ${isLive ? `<span class="live-tag">مباشر<br>${m.minute || ''}'</span>` : 
                          m.status === 'FINISHED' ? 'انتهت' : 
                          new Date(m.utcDate).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}
                    </div>
                    <div class="m-teams">
                        <div class="t-row">
                            <div class="t-pkg">
                                <img src="${m.homeTeam.crest}" class="t-logo" onerror="this.src='https://via.placeholder.com/20'">
                                <span class="t-name ${hScore > aScore ? 'win' : ''}">${m.homeTeam.name}</span>
                            </div>
                            <span class="m-score ${hScore > aScore ? 'win' : ''}">${hScore ?? '-'}</span>
                        </div>
                        <div class="t-row">
                            <div class="t-pkg">
                                <img src="${m.awayTeam.crest}" class="t-logo" onerror="this.src='https://via.placeholder.com/20'">
                                <span class="t-name ${aScore > hScore ? 'win' : ''}">${m.awayTeam.name}</span>
                            </div>
                            <span class="m-score ${aScore > hScore ? 'win' : ''}">${aScore ?? '-'}</span>
                        </div>
                    </div>
                    <div style="text-align:center; opacity:0.2">◀</div>
                </div>`;
            }).join('')
        }).join('');
    }

    function setFilter(id, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = id;
        render();
    }

    fetchData();
    setInterval(fetchData, 60000); // تحديث كل دقيقة
</script>

</body>
</html>
