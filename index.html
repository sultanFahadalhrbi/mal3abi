<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | النتائج الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --live: #ef4444; --past: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }
        header { text-align: center; margin-bottom: 20px; padding: 20px; border-bottom: 2px solid var(--card); }
        header h1 { color: var(--accent); font-size: 2.2rem; }
        .nav-leagues { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        .section-title { margin: 20px 0 10px; color: var(--accent); border-right: 4px solid var(--accent); padding-right: 10px; font-size: 1.1rem; }
        .match-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-right: 5px solid var(--accent); }
        .team { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team img { width: 35px; height: 35px; object-fit: contain; }
        .team span { font-weight: bold; font-size: 0.85rem; }
        .score-area { flex: 1; text-align: center; }
        .score { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
        .status-label { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 5px; }
        .loading { text-align: center; margin-top: 50px; color: var(--accent); }
        .info-msg { text-align: center; color: #fbbf24; padding: 15px; background: rgba(251, 191, 36, 0.1); border-radius: 10px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ ملعبي</h1>
        <p>متابعة نتائج الدوريات العالمية</p>
    </header>

    <div class="nav-leagues">
        <button class="nav-btn active" onclick="changeLeague('PL', this)">الإنجليزي</button>
        <button class="nav-btn" onclick="changeLeague('PD', this)">الإسباني</button>
        <button class="nav-btn" onclick="changeLeague('SA', this)">الإيطالي</button>
        <button class="nav-btn" onclick="changeLeague('BL1', this)">الألماني</button>
        <button class="nav-btn" onclick="changeLeague('CL', this)">دوري الأبطال</button>
    </div>

    <div id="info-bar"></div>
    <div id="matches-container">
        <div class="loading">جاري جلب البيانات...</div>
    </div>

    <script>
        const API_KEY = '9b0890e8a1324b4e9161b2cac08666dd';
        let currentLeague = 'PL';

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            const infoBar = document.getElementById('info-bar');
            container.innerHTML = '<div class="loading">يتم الآن تحديث النتائج...</div>';
            infoBar.innerHTML = '';
            
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = `https://api.football-data.org/v4/competitions/${currentLeague}/matches`;

            try {
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (response.status === 403) {
                    throw new Error('هذا الدوري يتطلب اشتراكاً مدفوعاً في API البيانات.');
                }
                if (!response.ok) throw new Error('خطأ في جلب البيانات، حاول مجدداً بعد دقيقة.');

                const data = await response.json();
                renderAll(data.matches);
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; color:#f87171; padding:20px;">⚠️ ${error.message}</div>`;
            }
        }

        function renderAll(matches) {
            const container = document.getElementById('matches-container');
            const infoBar = document.getElementById('info-bar');
            
            // جلب مباريات الشهر الحالي (أبريل 2026)
            const currentMonthMatches = matches.filter(m => {
                const d = new Date(m.utcDate);
                return d.getMonth() === 3 && d.getFullYear() === 2026;
            }).sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

            if (currentMonthMatches.length === 0) {
                infoBar.innerHTML = '<div class="info-msg">💡 تظهر لك الآن آخر مباريات تم لعبها (خارج شهر أبريل) لعدم توفر بيانات حالية.</div>';
                const lastMatches = matches.sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate)).slice(0, 15);
                displayMatches(lastMatches);
            } else {
                displayMatches(currentMonthMatches);
            }
        }

        function displayMatches(matchesList) {
            const container = document.getElementById('matches-container');
            container.innerHTML = matchesList.map(match => {
                const mDate = new Date(match.utcDate).toLocaleDateString('ar-SA', {month:'short', day:'numeric'});
                const mTime = new Date(match.utcDate).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
                return `
                    <div class="match-card">
                        <div class="team">
                            <img src="${match.homeTeam.crest || ''}" onerror="this.src='https://via.placeholder.com/35?text=?'">
                            <span>${match.homeTeam.shortName || match.homeTeam.name}</span>
                        </div>
                        <div class="score-area">
                            <div class="score">${match.score.fullTime.home ?? '-'} - ${match.score.fullTime.away ?? '-'}</div>
                            <span class="status-label">${mDate} | ${mTime}</span>
                        </div>
                        <div class="team">
                            <img src="${match.awayTeam.crest || ''}" onerror="this.src='https://via.placeholder.com/35?text=?'">
                            <span>${match.awayTeam.shortName || match.awayTeam.name}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeLeague(code, btn) {
            currentLeague = code;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchMatches();
        }

        fetchMatches();
    </script>
</body>
</html><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | أرشيف النتائج والمباريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --live: #ef4444; --past: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }
        header { text-align: center; margin-bottom: 20px; padding: 20px; border-bottom: 2px solid var(--card); }
        header h1 { color: var(--accent); font-size: 2.2rem; }
        .nav-leagues { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        
        .section-title { margin: 20px 0 10px; color: var(--accent); border-right: 4px solid var(--accent); padding-right: 10px; font-size: 1.1rem; }
        
        .match-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; border: 1px solid transparent; }
        .match-card.finished { border-right: 5px solid var(--past); opacity: 0.9; }
        .match-card.upcoming { border-right: 5px solid var(--accent); }
        
        .team { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team img { width: 35px; height: 35px; object-fit: contain; }
        .team span { font-weight: bold; font-size: 0.85rem; }
        
        .score-area { flex: 1; text-align: center; }
        .score { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
        .vs { font-size: 1rem; color: var(--past); }
        .status-label { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 5px; }
        
        .loading { text-align: center; margin-top: 50px; color: var(--accent); }
        .error-msg { text-align: center; color: #f87171; padding: 20px; background: rgba(248, 113, 113, 0.1); border-radius: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ ملعبي</h1>
        <p>النتائج السابقة والمباريات القادمة</p>
    </header>

    <div class="nav-leagues">
        <button class="nav-btn active" onclick="changeLeague('PL', this)">الإنجليزي</button>
        <button class="nav-btn" onclick="changeLeague('PD', this)">الإسباني</button>
        <button class="nav-btn" onclick="changeLeague('SA', this)">الإيطالي</button>
        <button class="nav-btn" onclick="changeLeague('BL1', this)">الألماني</button>
        <button class="nav-btn" onclick="changeLeague('CL', this)">دوري الأبطال</button>
    </div>

    <div id="matches-container">
        <div class="loading">جاري جلب الأرشيف...</div>
    </div>

    <script>
        const API_KEY = '9b0890e8a1324b4e9161b2cac08666dd';
        let currentLeague = 'PL';

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '<div class="loading">جاري تحديث البيانات...</div>';
            
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = `https://api.football-data.org/v4/competitions/${currentLeague}/matches`;

            try {
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) throw new Error('يرجى الانتظار دقيقة (ضغط على الخادم)');

                const data = await response.json();
                processAndRender(data.matches);
            } catch (error) {
                container.innerHTML = `<div class="error-msg">⚠️ ${error.message}</div>`;
            }
        }

        function processAndRender(matches) {
            const container = document.getElementById('matches-container');
            const now = new Date();

            // 1. نتائج المباريات السابقة (آخر 10 مباريات انتهت)
            const finishedMatches = matches
                .filter(m => m.status === 'FINISHED')
                .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate))
                .slice(0, 10);

            // 2. المباريات القادمة (أول 10 مباريات لم تبدأ بعد)
            const upcomingMatches = matches
                .filter(m => m.status === 'TIMED' || m.status === 'SCHEDULED')
                .sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate))
                .slice(0, 10);

            let html = '';

            if (upcomingMatches.length > 0) {
                html += '<h2 class="section-title">المباريات القادمة</h2>';
                html += upcomingMatches.map(m => createMatchCard(m, 'upcoming')).join('');
            }

            if (finishedMatches.length > 0) {
                html += '<h2 class="section-title">آخر النتائج</h2>';
                html += finishedMatches.map(m => createMatchCard(m, 'finished')).join('');
            }

            container.innerHTML = html || '<div class="loading">لا توجد بيانات حالياً.</div>';
        }

        function createMatchCard(match, type) {
            const mDate = new Date(match.utcDate).toLocaleDateString('ar-SA', {month:'long', day:'numeric'});
            const mTime = new Date(match.utcDate).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
            const scoreHome = match.score.fullTime.home ?? '-';
            const scoreAway = match.score.fullTime.away ?? '-';
            
            return `
                <div class="match-card ${type}">
                    <div class="team">
                        <img src="${match.homeTeam.crest || ''}" onerror="this.src='https://via.placeholder.com/35?text=?'">
                        <span>${match.homeTeam.shortName || match.homeTeam.name}</span>
                    </div>
                    <div class="score-area">
                        ${type === 'finished' ? 
                            `<div class="score">${scoreHome} - ${scoreAway}</div>` : 
                            `<div class="vs">VS</div>`}
                        <span class="status-label">${mDate} | ${mTime}</span>
                    </div>
                    <div class="team">
                        <img src="${match.awayTeam.crest || ''}" onerror="this.src='https://via.placeholder.com/35?text=?'">
                        <span>${match.awayTeam.shortName || match.awayTeam.name}</span>
                    </div>
                </div>
            `;
        }

        function changeLeague(code, btn) {
            currentLeague = code;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchMatches();
        }

        fetchMatches();
    </script>
</body>
</html>
