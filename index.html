<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملعبي | النتائج والترتيب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0b1120;
        --card-bg: rgba(30, 41, 59, 0.7);
        --accent: #38bdf8;
        --text-base: #e2e8f0;
        --text-muted: #94a3b8;
        --fav-color: #ef4444;
        --gold: #f59e0b;
        --live-color: #ef4444;
        --glass-bg: rgba(15, 23, 42, 0.85);
        --border-color: rgba(51, 65, 85, 0.5);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text-base); padding: 10px; padding-bottom: 70px; overflow-x: hidden; min-height: 100vh; }
    
    header { text-align: center; margin-bottom: 20px; padding-top: 15px; }
    header h1 { color: white; font-size: 2.3rem; text-shadow: 0 0 20px rgba(56,189,248,0.4); font-weight: 700; }

    .view-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
    .tab-btn { background: rgba(51, 65, 85, 0.4); border: 1px solid var(--border-color); color: var(--text-base); padding: 10px 30px; border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: all 0.3s ease; }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 4px 15px rgba(56,189,248,0.3); }

    .nav-leagues { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; }
    .nav-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-base); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s ease; }
    .nav-btn.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); border-color: var(--accent); }

    .months-scroller-container { position: sticky; top: 0; z-index: 1000; margin-bottom: 20px; border-radius: 20px; overflow: hidden; }
    .months-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 15px 10px; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); scrollbar-width: none; border-bottom: 1px solid var(--border-color); scroll-behavior: smooth; }
    .months-scroller::-webkit-scrollbar { display: none; }
    .month-btn { background: rgba(51, 65, 85, 0.4); border: 1px solid var(--border-color); color: var(--text-base); padding: 8px 20px; border-radius: 50px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: all 0.3s ease; }
    .month-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); transform: scale(1.05); }

    .ad-banner { background: rgba(15, 23, 42, 0.6); border: 1px dashed var(--border-color); border-radius: 15px; padding: 15px; margin: 15px 0; text-align: center; color: var(--text-muted); min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .ad-badge { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 5px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

    .matches-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
    @media (min-width: 600px) { .matches-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); } }

    .match-card { background: var(--card-bg); padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; position: relative; transition: all 0.3s ease; border: 1px solid var(--border-color); }
    .match-card.is-fav { border-color: var(--gold); background: linear-gradient(135deg, rgba(245, 158, 11, 0.08), rgba(30, 41, 59, 0.7)); }
    
    .team { flex: 1; text-align: center; cursor: pointer; position: relative; padding: 8px; border-radius: 12px; transition: all 0.3s ease; }
    .team:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
    
    .crest-container { position: relative; width: 45px; height: 45px; margin: 0 auto; margin-bottom: 8px; }
    .team-crest { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
    .team-name { font-size: 0.8rem; font-weight: bold; color: white; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    
    .fav-heart { position: absolute; top: -5px; right: -5px; font-size: 1rem; color: #475569; transition: all 0.3s ease; opacity: 0.5; }
    .is-following .fav-heart { color: var(--fav-color); opacity: 1; text-shadow: 0 0 10px var(--fav-color); transform: scale(1.2); }

    .score-area { flex: 1; text-align: center; padding: 0 10px; }
    .score { font-size: 1.8rem; color: var(--accent); font-weight: bold; letter-spacing: 2px; }
    .status-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; display: block; }
    .live-badge { color: white; background: var(--live-color); padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; animation: blink 1.5s infinite; font-weight: bold; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .standings-wrapper { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color); padding-bottom: 5px; }
    .standings-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; white-space: nowrap; }
    .standings-table th { background: rgba(15, 23, 42, 0.6); padding: 12px 10px; color: var(--accent); font-weight: bold; border-bottom: 2px solid var(--border-color); }
    .standings-table td { padding: 12px 10px; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }
    .team-cell { display: flex; align-items: center; gap: 10px; text-align: right; font-weight: bold; }
    .team-cell img { width: 25px; height: 25px; object-fit: contain; }
    .pts-cell { font-weight: bold; color: var(--accent); font-size: 1rem; }
    .is-fav-row { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), transparent); border-right: 4px solid var(--gold); }
    .group-title { margin: 25px 0 10px; color: white; font-size: 1.1rem; padding-right: 15px; border-right: 4px solid var(--accent); }

    .loader { border: 4px solid #334155; border-top: 4px solid var(--accent); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 50px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; z-index:
