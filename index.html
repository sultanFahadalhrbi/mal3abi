<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | نتائج مباشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --live: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }
        header { text-align: center; margin-bottom: 20px; padding: 20px; border-bottom: 2px solid var(--card); }
        header h1 { color: var(--accent); font-size: 2rem; }
        .nav-leagues { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid var(--accent); color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .team { flex: 2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .score-area { flex: 1; text-align: center; }
        .score { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .live-tag { background: var(--live); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .loading { text-align: center; margin-top: 30px; color: var(--accent); }
        .error-msg { text-align: center; color: #f87171; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ ملعبي</h1>
        <p>نتائج حية من قلب الحدث</p>
    </header>

    <div class="nav-leagues">
        <button class="nav-btn active" onclick="changeLeague('PL', this)">الإنجليزي</button>
        <button class="nav-btn" onclick="changeLeague('PD', this)">الإسباني</button>
        <button class="nav-btn" onclick="changeLeague('SA', this)">الإيطالي</button>
        <button class="nav-btn" onclick="changeLeague('BL1', this)">الألماني</button>
        <button class="nav-btn" onclick="changeLeague('CL', this)">دوري الأبطال</button>
    </div>

    <div id="matches-container">
        <div class="loading">جاري جلب المباريات...</div>
    </div>

    <script>
        const API_KEY = '9b0890e8a1324b4e9161b2cac08666dd';
        let currentLeague = 'PL';

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${currentLeague}/matches`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (response.status === 429) {
                    throw new Error('أبطئ قليلاً! تم الوصول للحد الأقصى من الطلبات. انتظر دقيقة.');
                }

                const data = await response.json();
                renderMatches(data.matches);
            } catch (error) {
                container.innerHTML = `<div class="error-msg">${error.message}</div>`;
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            // عرض مباريات اليوم فقط
            const today = new Date().toISOString().split('T')[0];
            const todayMatches = matches.filter(m => m.utcDate.startsWith(today));

            if (todayMatches.length === 0) {
                container.innerHTML = '<div class="loading">لا توجد مباريات مجدولة لليوم.</div>';
                return;
            }

            container.innerHTML = todayMatches.map(match => {
                const isLive = ['IN_PLAY', 'PAUSED'].includes(match.status);
                return `
                    <div class="match-card">
                        <div class="team">
                            <img src="${match.homeTeam.crest}">
                            <span>${match.homeTeam.shortName || match.homeTeam.name}</span>
                        </div>
                        <div class="score-area">
                            <div class="score">${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}</div>
                            <div class="status">
                                ${isLive ? '<span class="live-tag">مباشر</span>' : new Date(match.utcDate).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'})}
                            </div>
                        </div>
                        <div class="team">
                            <img src="${match.awayTeam.crest}">
                            <span>${match.awayTeam.shortName || match.awayTeam.name}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeLeague(code, btn) {
            currentLeague = code;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchMatches();
        }

        fetchMatches();
        // تحديث تلقائي كل دقيقتين لتجنب الحظر
        setInterval(fetchMatches, 120000);
    </script>
</body>
</html>
