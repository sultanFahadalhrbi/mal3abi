<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملعبي Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
--bg: #0f172a;
--card: #1e293b;
--accent: #38bdf8;
--text: #f1f5f9;
--fav: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }

body {
background: var(--bg);
color: var(--text);
padding: 15px;
padding-bottom: 80px;
}

header {
text-align: center;
margin-bottom: 20px;
}

header h1 {
color: var(--accent);
}

.hint {
font-size: 0.8rem;
color: #94a3b8;
margin-top: 5px;
}

.loader {
border: 3px solid #334155;
border-top: 3px solid var(--accent);
border-radius: 50%;
width: 30px;
height: 30px;
animation: spin 1s linear infinite;
margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.nav-leagues {
display: flex;
flex-wrap: wrap;
gap: 6px;
justify-content: center;
margin: 15px 0;
}

.nav-btn {
background: var(--card);
border: 1px solid var(--accent);
color: var(--text);
padding: 8px 12px;
border-radius: 10px;
cursor: pointer;
}

.nav-btn.active {
background: var(--accent);
color: var(--bg);
}

.match-card {
background: var(--card);
padding: 12px;
border-radius: 12px;
margin-bottom: 10px;
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.team {
flex: 1;
text-align: center;
cursor: pointer;
}

.team img {
width: 36px;
}

.score-area {
flex: 1;
text-align: center;
}

.score {
font-size: 1.3rem;
color: var(--accent);
font-weight: bold;
}

.status-label {
font-size: 0.75rem;
color: #94a3b8;
}

.toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background: var(--accent);
color: #000;
padding: 10px 15px;
border-radius: 8px;
}
</style>
</head>

<body>

<header>
<h1>⚽ ملعبي Pro</h1>
<p class="hint">اختر فريقك المفضل ⭐</p>
<p id="fav-name"></p>
</header>

<div class="nav-leagues">
<button class="nav-btn active" onclick="changeLeague('PL', this)">الإنجليزي</button>
<button class="nav-btn" onclick="changeLeague('PD', this)">الإسباني</button>
</div>

<div id="content">
<div class="loader"></div>
</div>

<script>
const API_KEY = 'PUT_YOUR_KEY_HERE';
let currentLeague = 'PL';
let favoriteTeamId = localStorage.getItem('favTeamId');
let favoriteTeamName = localStorage.getItem('favTeamName');

function showToast(msg) {
const t = document.createElement("div");
t.className = "toast";
t.innerText = msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

async function fetchMatches() {
const url = `https://api.football-data.org/v4/competitions/${currentLeague}/matches`;
const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(url), {
headers: { 'X-Auth-Token': API_KEY }
});
return await res.json();
}

async function load() {
document.getElementById('content').innerHTML = '<div class="loader"></div>';

try {
const data = await fetchMatches();
render(data.matches);
} catch {
document.getElementById('content').innerHTML = "❌ فشل تحميل البيانات";
}
}

function render(matches) {
const html = matches.slice(0,15).map(m => {
const isLive = m.status === "IN_PLAY";
return `
<div class="match-card">
<div class="team" onclick="setFav(${m.homeTeam.id}, '${m.homeTeam.name}')">
<img src="${m.homeTeam.crest}">
<div>${m.homeTeam.shortName}</div>
</div>

<div class="score-area">
<div class="score">${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}</div>
<div class="status-label">${isLive ? '🔴 مباشر' : new Date(m.utcDate).toLocaleDateString('ar-SA')}</div>
</div>

<div class="team" onclick="setFav(${m.awayTeam.id}, '${m.awayTeam.name}')">
<img src="${m.awayTeam.crest}">
<div>${m.awayTeam.shortName}</div>
</div>
</div>
`;
}).join('');

document.getElementById('content').innerHTML = html;

if (favoriteTeamName) {
document.getElementById('fav-name').innerText = "فريقك: " + favoriteTeamName;
}
}

function setFav(id, name) {
favoriteTeamId = id;
favoriteTeamName = name;
localStorage.setItem('favTeamId', id);
localStorage.setItem('favTeamName', name);
showToast("تم اختيار " + name);
load();
}

function changeLeague(code, btn) {
currentLeague = code;
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
load();
}

load();
</script>

</body>
</html>
