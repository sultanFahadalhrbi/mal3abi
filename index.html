<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعبي | Mal3abi - نتائج مباشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --live: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }

        body { background-color: var(--bg); color: var(--text); padding: 20px; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--accent); font-size: 2.5rem; }

        .nav-leagues {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        #matches-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .match-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .team {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .team img { width: 50px; height: 50px; object-fit: contain; }

        .score-area {
            flex: 1;
            text-align: center;
        }

        .score {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .status {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 5px;
        }

        .live-tag {
            background: var(--live);
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .loading { text-align: center; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>⚽ ملعبي</h1>
        <p>نتائج المباريات المباشرة</p>
    </header>

    <div class="nav-leagues">
        <button class="nav-btn active" onclick="changeLeague('PL', this)">الدوري الإنجليزي</button>
        <button class="nav-btn" onclick="changeLeague('PD', this)">الدوري الإسباني</button>
        <button class="nav-btn" onclick="changeLeague('CL', this)">دوري الأبطال</button>
        <button class="nav-btn" onclick="changeLeague('SA', this)">الدوري الإيطالي</button>
    </div>

    <div id="matches-container">
        <div class="loading">جاري جلب النتائج...</div>
    </div>

    <script>
        // ضع مفتاح الـ API الخاص بك هنا بين العلامتين ''
       const API_KEY = '9b0890e8a1324b4e9161b2cac08666dd'; 
        let currentLeague = 'PL';

        async function fetchMatches() {
            const container = document.getElementById('matches-container');
            
            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${currentLeague}/matches?status=LIVE,SCHEDULED,IN_PLAY`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) throw new Error('فشل جلب البيانات');

                const data = await response.json();
                renderMatches(data.matches);
            } catch (error) {
                container.innerHTML = `<div class="loading" style="color:red">خطأ: تأكد من مفتاح الـ API الخاص بك (أو انتهى حد الطلبات المجاني)</div>`;
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            if (matches.length === 0) {
                container.innerHTML = `<div class="loading">لا توجد مباريات حالياً</div>`;
                return;
            }

            container.innerHTML = matches.map(match => {
                const isLive = ['IN_PLAY', 'PAUSED'].includes(match.status);
                return `
                    <div class="match-card">
                        <div class="team">
                            <img src="${match.homeTeam.crest}" alt="${match.homeTeam.name}">
                            <span>${match.homeTeam.shortName || match.homeTeam.name}</span>
                        </div>
                        
                        <div class="score-area">
                            <div class="score">
                                ${match.score.fullTime.home ?? 0} - ${match.score.fullTime.away ?? 0}
                            </div>
                            <div class="status">
                                ${isLive ? '<span class="live-tag">مباشر</span>' : new Date(match.utcDate).toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'})}
                            </div>
                        </div>

                        <div class="team">
                            <img src="${match.awayTeam.crest}" alt="${match.awayTeam.name}">
                            <span>${match.awayTeam.shortName || match.awayTeam.name}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeLeague(leagueCode, btn) {
            currentLeague = leagueCode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('matches-container').innerHTML = '<div class="loading">جاري التحديث...</div>';
            fetchMatches();
        }

        // تحديث البيانات كل دقيقة تلقائياً
        fetchMatches();
        setInterval(fetchMatches, 60000);
    </script>
</body>
</html>
